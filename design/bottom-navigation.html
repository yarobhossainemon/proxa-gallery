<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Proxa Gallery — Signature Navigation (Concept 1)</title>
<style>
  /* ===========================================================
     PROXA GALLERY — SIGNATURE BOTTOM NAVIGATION  (CONCEPT 1)
     Canvas: 1440 × 3200  (9:19.5)

     The AI orb FLOATS above the dock and overlaps its top edge
     by ~40-50%. The dock has a curved notch cut into the top
     edge so the orb feels integrated, not like a Material FAB.
     The dock remains ONE continuous glass surface (not split).
     =========================================================== */

  :root{
    --canvas-w: 1440px;
    --canvas-h: 3200px;

    --glass-1: rgba(20, 22, 30, 0.42);
    --glass-2: rgba(10, 11, 16, 0.62);
    --glass-3: rgba(6, 7, 11, 0.78);
    --edge: rgba(255,255,255,0.16);

    --icon-muted: rgba(226, 230, 242, 0.50);
    --icon-on: #EAEEFB;
    --samsung-blue: #5B8DFF;
    --cyan: #67E8FF;
    --purple: #9D6BFF;

    --label-muted: rgba(226, 230, 242, 0.46);
    --label-on: rgba(234, 238, 251, 0.94);

    /* Orb geometry (at 1440 canvas scale) */
    --orb-d: 132px;          /* ~74dp — unchanged */
    --orb-overlap: 86px;     /* embeds deeper; ~65% of orb inside dock, ~35% protrudes */
    --notch-r: 92px;         /* deeper curved notch to cradle the lower orb */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background:#040506;
    font-family: "Samsung One", "Inter", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .stage{
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    background: radial-gradient(60% 50% at 50% 40%, #0a0c10 0%, #050608 60%, #020203 100%);
  }

  .phone{
    position:relative;
    width:var(--canvas-w);
    height:var(--canvas-h);
    background:#050608;
    border-radius:170px;
    overflow:hidden;
    box-shadow:
      0 80px 200px rgba(0,0,0,0.85),
      inset 0 0 0 3px rgba(255,255,255,0.045);
    transform-origin:center center;
  }
  @media (max-width: 1500px){
    .phone{ transform: scale(calc((100vw - 48px) / 1440)); }
  }

  /* ---------- Blurred empty placeholder ---------- */
  .bg{
    position:absolute; inset:0;
    background:
      radial-gradient(70% 50% at 30% 25%, rgba(40,46,66,0.55), transparent 60%),
      radial-gradient(60% 45% at 75% 35%, rgba(28,30,44,0.6), transparent 60%),
      radial-gradient(80% 60% at 50% 80%, rgba(14,16,24,0.9), transparent 70%),
      linear-gradient(180deg, #0a0c12 0%, #060709 60%, #04050680 100%);
    filter: blur(28px) brightness(0.8);
    transform: scale(1.08);
  }
  .vignette{
    position:absolute; inset:0;
    background: radial-gradient(120% 90% at 50% 35%, transparent 40%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }

  /* ===========================================================
     NAVIGATION WRAP
     =========================================================== */
  .nav-wrap{
    position:absolute;
    left:56px; right:56px;
    bottom:76px;          /* floats above gesture area */
    height:212px;
  }

  /* ---- Continuous glass dock WITH curved top notch ----
     The notch is created with two pseudo layers:
       1) The SVG mask layer (dock-with-notch.svg) defines the
          dock silhouette including the curved notch.
       2) The .dock glass is clipped to that silhouette.
     Background + edge ring are drawn by the SVG itself so the
     white highlight also follows the notch curve seamlessly.
  */
  .dock-svg{
    position:absolute;
    left:0; right:0; bottom:0;
    width:100%;
    height:212px;
    display:block;
    /* soft drop shadow under whole dock */
    filter:
      drop-shadow(0 40px 60px rgba(0,0,0,0.55))
      drop-shadow(0 14px 28px rgba(0,0,0,0.45));
  }

  /* ---- Tab row: 4 equal items (Gallery, Albums, Library, Settings) ---- */
  .tabs{
    position:absolute;
    left:0; right:0; bottom:0;
    height:176px;
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    align-items:center;
    padding:0 40px;
  }

  .tab{
    position:relative;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:11px;
    height:100%;
    padding-top:18px;
    color:var(--icon-muted);
  }
  .tab .ic{
    width:56px; height:56px;
    display:flex; align-items:center; justify-content:center;
    transition: filter .35s ease;
  }
  .tab svg{
    width:100%; height:100%;
    stroke:currentColor; stroke-width:1.7; fill:none;
    stroke-linecap:round; stroke-linejoin:round;
  }
  .tab .lbl{
    font-size:21px; font-weight:500; letter-spacing:0.015em;
    color:var(--label-muted);
  }

  .tab.on{ color:var(--icon-on); }
  .tab.on .ic{
    filter:
      drop-shadow(0 0 9px rgba(91,141,255,0.55))
      drop-shadow(0 0 3px rgba(103,232,255,0.5));
  }
  .tab.on svg{ stroke:var(--samsung-blue); stroke-width:2; }
  .tab.on .lbl{ color:var(--label-on); }
  .tab.on::before{
    content:"";
    position:absolute; top:9px;
    width:30px; height:5px; border-radius:5px;
    background:linear-gradient(90deg, var(--samsung-blue), var(--cyan));
    box-shadow:0 0 14px rgba(91,141,255,0.7);
  }

  /* ===========================================================
     PROXA AI ORB — floats above dock, overlaps top edge ~44%
     =========================================================== */
  .orb-wrap{
    position:absolute;
    left:50%;
    /* vertically: orb bottom sits inside dock; top floats above */
    bottom: calc(176px - var(--orb-overlap) + var(--orb-d)/2 - var(--orb-d)/2);
    transform: translate(-50%, 50%);
    /* place orb center at the dock top edge line → top half floats */
    width:var(--orb-d);
    height:var(--orb-d);
    /* above dock so ring/glow aren't clipped */
    z-index:5;
  }

  /* Recompute: orb CENTER on dock's top edge → overlap = 50%.
     We want ~44% overlap → center sits slightly BELOW top edge.
     orb-overlap(58px) of orb-d(132px) = 44%.
     Orb top = dock_top - (orb_d - overlap) = dock_top - 74px
     → orb floats 74px above the dock top.
  */
  .orb-wrap{
    bottom: auto;
    top: calc(212px - 176px);          /* = dock top (dock is 176 tall, wrap 212) */
    transform: translate(-50%, calc(-1 * (var(--orb-d) - var(--orb-overlap))));
  }

  .orb{
    position:relative;
    width:100%; height:100%;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(120% 120% at 32% 28%, rgba(255,255,255,0.30), rgba(255,255,255,0.05) 38%, rgba(8,10,16,0.25) 72%),
      linear-gradient(155deg, rgba(36,40,56,0.55), rgba(10,12,18,0.70));
    backdrop-filter: blur(26px) saturate(170%);
    -webkit-backdrop-filter: blur(26px) saturate(170%);
    box-shadow:
      0 0 0 1.3px rgba(255,255,255,0.24),
      0 30px 60px rgba(0,0,0,0.60),
      0 12px 26px rgba(60,110,220,0.30),
      inset 0 2.5px 4px rgba(255,255,255,0.40),
      inset 0 -5px 12px rgba(0,0,0,0.45);
    animation: breathe 5s ease-in-out infinite;
  }

  /* animated gradient ring (blue → cyan → purple) */
  .orb::before{
    content:"";
    position:absolute; inset:-5px;
    border-radius:50%;
    background: conic-gradient(from 0deg,
      #4C8CFF 0deg, #67E8FF 90deg, #9D6BFF 200deg, #4C8CFF 360deg);
    z-index:-1;
    animation: spin 7s linear infinite;
    -webkit-mask: radial-gradient(farthest-side, transparent 80%, #000 82%);
            mask: radial-gradient(farthest-side, transparent 80%, #000 82%);
  }
  /* soft ambient glow — reduced ~30% intensity & spread */
  .orb::after{
    content:"";
    position:absolute; inset:-12px;
    border-radius:50%;
    background: radial-gradient(circle,
      rgba(80,160,255,0.32) 0%, rgba(120,90,255,0.14) 40%, transparent 68%);
    z-index:-2;
    animation: glow 5s ease-in-out infinite;
  }

  @keyframes spin{ to{ transform: rotate(360deg); } }
  @keyframes breathe{
    0%,100%{ transform: translateY(0) scale(1); }
    50%   { transform: translateY(-2px) scale(1.012); }
  }
  @keyframes glow{
    0%,100%{ opacity:0.40; }
    50%   { opacity:0.62; }
  }

  /* PROXA SYMBOL */
  .proxa{ width:74px; height:74px; position:relative;
          display:flex; align-items:center; justify-content:center; }
  .proxa svg{ width:100%; height:100%; overflow:visible; }
  .proxa::after{
    content:"";
    position:absolute; left:18%; right:18%; top:6%;
    height:30%; border-radius:50%;
    background:linear-gradient(180deg, rgba(255,255,255,0.55), transparent);
    filter: blur(3px); opacity:0.6; pointer-events:none;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="phone">

    <!-- Empty blurred placeholder -->
    <div class="bg"></div>
    <div class="vignette"></div>

    <!-- =======================================================
         BOTTOM NAVIGATION (Concept 1)
         ======================================================= -->
    <div class="nav-wrap">

      <!-- Continuous glass dock with curved notch, drawn as SVG
           so the glass fill AND the white edge highlight both
           follow the notch curve. One single surface. -->
      <svg class="dock-svg" viewBox="0 0 1328 212" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- glass vertical gradient -->
          <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="rgba(20,22,30,0.42)"/>
            <stop offset="55%" stop-color="rgba(10,11,16,0.62)"/>
            <stop offset="100%" stop-color="rgba(6,7,11,0.78)"/>
          </linearGradient>
          <!-- top sheen -->
          <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <!-- dock silhouette: rounded rect with circular notch on top center -->
          <!-- viewBox width 1328 (1328 = 1440 - 2*56). notch center x=664 -->
          <!-- notch radius = 92 (deeper, to cradle the lowered orb), top of dock y=36, bottom y=212 -->
          <path id="dockShape" d="
            M 60 36
            L 572 36
            A 92 92 0 0 1 756 36
            L 1268 36
            A 60 60 0 0 1 1328 96
            L 1328 152
            A 60 60 0 0 1 1268 212
            L 60 212
            A 60 60 0 0 1 0 152
            L 0 96
            A 60 60 0 0 1 60 36
            Z"/>
          <clipPath id="dockClip"><use href="#dockShape"/></clipPath>
        </defs>

        <!-- glass fill -->
        <use href="#dockShape" fill="url(#glass)"/>
        <!-- top sheen, clipped to dock -->
        <rect x="0" y="36" width="1328" height="80" fill="url(#sheen)" clip-path="url(#dockClip)"/>

        <!-- thin white edge highlight following the WHOLE outline (incl. notch) -->
        <use href="#dockShape" fill="none"
             stroke="rgba(255,255,255,0.18)" stroke-width="1.4"/>
        <!-- brighter hairline on top edge only (fades at notch) -->
        <path d="M 60 37 L 572 37" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M 756 37 L 1268 37" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <!-- subtle notch-edge accent (cyan tint) -->
        <path d="M 572 36 A 92 92 0 0 1 756 36"
              stroke="rgba(120,200,255,0.28)" stroke-width="1.6" fill="none"/>
      </svg>

      <!-- Tabs: 4 items only (AI removed from row) -->
      <div class="tabs">

        <!-- 1. Gallery (selected) -->
        <div class="tab on">
          <div class="ic">
            <svg viewBox="0 0 24 24">
              <rect x="3"    y="3" width="7.6" height="7.6" rx="2"/>
              <rect x="13.4" y="3" width="7.6" height="7.6" rx="2"/>
              <rect x="3"    y="13.4" width="7.6" height="7.6" rx="2"/>
              <rect x="13.4" y="13.4" width="7.6" height="7.6" rx="2"/>
            </svg>
          </div>
          <span class="lbl">Gallery</span>
        </div>

        <!-- 2. Albums -->
        <div class="tab">
          <div class="ic">
            <svg viewBox="0 0 24 24">
              <rect x="3.5" y="5.5" width="17" height="13" rx="2.2"/>
              <path d="M3.5 9.5h17"/>
              <circle cx="8.2" cy="13.5" r="1.5"/>
              <path d="M12.5 13.5h5"/>
            </svg>
          </div>
          <span class="lbl">Albums</span>
        </div>

        <!-- 3. Library -->
        <div class="tab">
          <div class="ic">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="4.5" width="6" height="15" rx="1.6"/>
              <rect x="11.5" y="4.5" width="6" height="15" rx="1.6"/>
              <path d="M19 6.2l3.4 13.2"/>
            </svg>
          </div>
          <span class="lbl">Library</span>
        </div>

        <!-- 4. Settings -->
        <div class="tab">
          <div class="ic">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3.4"/>
              <path d="M12 2.6v3"/><path d="M12 18.4v3"/>
              <path d="M21.4 12h-3"/><path d="M5.6 12h-3"/>
              <path d="M18.5 5.5l-2.1 2.1"/><path d="M7.6 16.4l-2.1 2.1"/>
              <path d="M18.5 18.5l-2.1-2.1"/><path d="M7.6 7.6L5.5 5.5"/>
            </svg>
          </div>
          <span class="lbl">Settings</span>
        </div>

      </div>

      <!-- ===== Proxa AI orb (floating above dock, overlapping top edge) ===== -->
      <div class="orb-wrap">
        <div class="orb">
          <div class="proxa">
            <svg viewBox="0 0 80 80">
              <defs>
                <linearGradient id="facetA" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%"  stop-color="#A9D4FF"/>
                  <stop offset="100%" stop-color="#4C8CFF"/>
                </linearGradient>
                <linearGradient id="facetB" x1="1" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#B79BFF"/>
                  <stop offset="100%" stop-color="#6E4DFF"/>
                </linearGradient>
                <linearGradient id="facetC" x1="0" y1="1" x2="1" y2="0">
                  <stop offset="0%"  stop-color="#7FF0FF"/>
                  <stop offset="100%" stop-color="#2FA8E6"/>
                </linearGradient>
                <radialGradient id="core" cx="50%" cy="45%" r="55%">
                  <stop offset="0%"  stop-color="#ffffff"/>
                  <stop offset="55%" stop-color="#DCEEFF"/>
                  <stop offset="100%" stop-color="#9BC8FF"/>
                </radialGradient>
                <radialGradient id="shine" cx="38%" cy="30%" r="55%">
                  <stop offset="0%"  stop-color="#fff" stop-opacity="0.9"/>
                  <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
                </radialGradient>
              </defs>

              <path d="M40 8 L66 30 L40 40 Z" fill="url(#facetA)"/>
              <path d="M40 40 L66 30 L56 64 Z" fill="url(#facetB)"/>
              <path d="M40 40 L56 64 L40 72 L24 64 L14 30 L40 40 Z"
                    fill="url(#facetC)" opacity="0.92"/>
              <path d="M40 8 L14 30 L40 40 Z" fill="url(#facetA)" opacity="0.78"/>

              <g stroke="#ffffff" stroke-width="0.8" opacity="0.55" stroke-linejoin="round">
                <path d="M40 8 L66 30 L56 64 L40 72 L24 64 L14 30 Z"/>
                <path d="M40 8 L40 40"/>
                <path d="M66 30 L40 40"/>
                <path d="M14 30 L40 40"/>
                <path d="M56 64 L40 40"/>
                <path d="M24 64 L40 40"/>
              </g>

              <circle cx="40" cy="40" r="7.5" fill="url(#core)"/>
              <circle cx="40" cy="40" r="3"  fill="#ffffff"/>

              <path d="M40 8 L66 30 L40 40 L14 30 Z" fill="url(#shine)"/>

              <path d="M64 12
                       C 65 17, 68 20, 73 21
                       C 68 22, 65 25, 64 30
                       C 63 25, 60 22, 55 21
                       C 60 20, 63 17, 64 12 Z"
                    fill="#9FF4FF" opacity="0.9"/>
            </svg>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
</body>
</html>
